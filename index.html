<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photos</title>

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f0f10;
            color: #e5e5e5;
        }

        header {
            position: sticky;
            top: 0;
            background: rgba(20, 20, 22, 0.9);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
        }

        h2 {
            margin: 0;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        input,
        select {
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: #1a1a1d;
            color: #e5e5e5;
        }

        input {
            flex: 1;
        }

        .grid {
            column-count: 4;
            column-gap: 15px;
            padding: 15px;
        }

        @media (max-width: 1000px) {
            .grid {
                column-count: 3;
            }
        }

        @media (max-width: 700px) {
            .grid {
                column-count: 2;
            }
        }

        @media (max-width: 500px) {
            .grid {
                column-count: 1;
            }
        }

        .card {
            position: relative;
            margin-bottom: 15px;
            border-radius: 14px;
            overflow: hidden;
            break-inside: avoid;
            cursor: pointer;
        }

        .card img {
            width: 100%;
            display: block;
            transition: transform 0.3s ease;
        }

        .card:hover img {
            transform: scale(1.05);
        }

        /* HOVER OVERLAY */
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top,
                    rgba(0, 0, 0, 0.75),
                    rgba(0, 0, 0, 0.2),
                    transparent);
            opacity: 0;
            display: flex;
            align-items: flex-end;
            padding: 12px;
            transition: opacity 0.25s ease;
        }

        .card:hover .overlay {
            opacity: 1;
        }

        .overlay-text {
            font-size: 14px;
            line-height: 1.4;
        }

        .camera {
            font-size: 12px;
            color: #b0b0b0;
            margin-top: 4px;
        }
    </style>
</head>

<body>

    <header>
        <h2>Photo Hub</h2>
        <select id="cameraFilter">
            <option value="all">All Cameras</option>
        </select>
    </header>

    <div class="grid" id="grid"></div>

    <script>
        const grid = document.getElementById("grid");
        let filter = document.getElementById("cameraFilter");
        let currentFilter = "all";
        let data = [];

        function populateFilters() {
            // Normalize + dedupe
            const cameras = [
                ...new Set(
                    data.map(item =>
                        item.camera?.trim().toLowerCase()
                    )
                )
            ];
            console.log(cameras);

            // Sort for nicer UX
            cameras.sort();

            // Add back with proper display casing
            cameras.forEach(cam => {
                const option = document.createElement("option");
                option.value = cam;
                option.textContent = cam.charAt(0).toUpperCase() + cam.slice(1);
                filter.appendChild(option);
            });
            console.log(cameras);
        }

        async function loadData() {
            try {
                const response = await fetch("data.json");
                data = await response.json();
                resetGrid(); // render after loading

                populateFilters();
            } catch (err) {
                console.error("Failed to load JSON:", err);
            }
        }
        loadData();


        function createCard(item) {
            const card = document.createElement("div");
            card.className = "card";

            const img = document.createElement("img");
            img.src = item.src;

            const overlay = document.createElement("div");
            overlay.className = "overlay";

            const text = document.createElement("div");
            text.className = "overlay-text";
            text.innerHTML = `${item.caption}<div class="camera">${item.camera}</div>`;

            overlay.appendChild(text);
            card.appendChild(img);
            card.appendChild(overlay);

            return card;
        }

        function getFilteredData() {
            if (currentFilter === "all") return data;
            return data.filter(item => item.camera.toLowerCase() === currentFilter.toLowerCase());
        }

        function loadPins() {
            const filtered = getFilteredData();

            for (let i = 0; i < filtered.length; i++) {
                console.log(filtered[i]);
                grid.appendChild(createCard(filtered[i]));
            }
        }

        function resetGrid() {
            grid.innerHTML = "";
            loadPins();
        }

        filter.addEventListener("change", (e) => {
            currentFilter = e.target.value;
            resetGrid();
        });

        loadPins();
    </script>

</body>

</html>
