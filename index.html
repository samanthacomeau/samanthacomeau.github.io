<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Projects</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f10;
      color: #e5e5e5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    p {
      color: #aaa;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
    }

    .card {
      background: #1a1a1d;
      padding: 20px;
      border-radius: 14px;
      text-decoration: none;
      color: #e5e5e5;
      transition: transform 0.2s, background 0.2s;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .card:hover {
      transform: translateY(-3px);
      background: #222226;
    }

    .title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .desc {
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>My Projects</h1>
    <p>A small collection of things I’m building</p>

    <div class="grid">

      <!-- Photo Project -->
      <a class="card" href="photo/index.html">
        <div class="title">Photo Hub</div>
        <div class="desc">Browse, filter, and explore my photography collection</div>
      </a>

      <!-- Bucket List -->
      <a class="card" href="bucketlist/index.html">
        <div class="title">Bucket List</div>
        <div class="desc">A collection of items on my bucket list</div>
      </a>

    </div>
  </div>

</body>
</html>
