<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photos</title>

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f0f10;
            color: #e5e5e5;
        }

        header {
            position: sticky;
            top: 0;
            background: rgba(20, 20, 22, 0.9);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
        }

        h2 {
            margin: 0;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        input,
        select {
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: #1a1a1d;
            color: #e5e5e5;
        }

        input {
            flex: 1;
        }

        .grid {
            column-count: 4;
            column-gap: 15px;
            padding: 15px;
        }

        @media (max-width: 1000px) {
            .grid {
                column-count: 3;
            }
        }

        @media (max-width: 700px) {
            .grid {
                column-count: 2;
            }
        }

        @media (max-width: 500px) {
            .grid {
                column-count: 1;
            }
        }

        .card {
            position: relative;
            margin-bottom: 15px;
            border-radius: 14px;
            overflow: hidden;
            break-inside: avoid;
            cursor: pointer;
        }

        .card img {
            width: 100%;
            display: block;
            transition: transform 0.3s ease;
        }

        .card:hover img {
            transform: scale(1.05);
        }

        /* HOVER OVERLAY */
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top,
                    rgba(0, 0, 0, 0.75),
                    rgba(0, 0, 0, 0.2),
                    transparent);
            opacity: 0;
            display: flex;
            align-items: flex-end;
            padding: 12px;
            transition: opacity 0.25s ease;
        }

        .card:hover .overlay {
            opacity: 1;
        }

        .overlay-text {
            font-size: 14px;
            line-height: 1.4;
        }

        .camera {
            font-size: 12px;
            color: #b0b0b0;
            margin-top: 4px;
        }
    </style>
</head>

<body>

    <header>
        <h2>Photo Hub</h2>
        <select id="cameraFilter">
            <option value="all">All Cameras</option>
        </select>

        <select id="locationFilter">
            <option value="all">All Locations</option>
        </select>

        <select id="tagFilter">
            <option value="all">All Tags</option>
        </select>
    </header>

    <div class="grid" id="grid"></div>

    <script>
        const grid = document.getElementById("grid");
        let filter = document.getElementById("cameraFilter");
        let data = [];

        let currentFilters = {
            camera: "all",
            location: "all",
            tag: "all",
            search: ""
        };

        function uniqueValues(key) {
            const values = new Set();

            data.forEach(item => {
                if (key === "tags") {
                    (item.tags || []).forEach(t => values.add(t));
                } else {
                    values.add(item[key]);
                }
            });

            return [...values].filter(Boolean).sort();
        }

        function populateFilters() {
            const cameraSel = document.getElementById("cameraFilter");
            const locationSel = document.getElementById("locationFilter");
            const tagSel = document.getElementById("tagFilter");

            // Cameras
            uniqueValues("camera").forEach(val => {
                const opt = document.createElement("option");
                opt.value = val;
                opt.textContent = val;
                cameraSel.appendChild(opt);
            });

            // Locations
            uniqueValues("location").forEach(val => {
                const opt = document.createElement("option");
                opt.value = val;
                opt.textContent = val;
                locationSel.appendChild(opt);
            });

            // Tags
            uniqueValues("tags").forEach(val => {
                const opt = document.createElement("option");
                opt.value = val;
                opt.textContent = val;
                tagSel.appendChild(opt);
            });
        }

        async function loadData() {
            try {
                const response = await fetch("data.json");
                data = await response.json();
                render();
                populateFilters();
            } catch (err) {
                console.error("Failed to load JSON:", err);
            }
        }
        loadData();

        function createCard(item) {
            const card = document.createElement("div");
            card.className = "card";

            const img = document.createElement("img");
            img.src = item.src;

            const overlay = document.createElement("div");
            overlay.className = "overlay";

            const text = document.createElement("div");
            text.className = "overlay-text";
            text.innerHTML = `${item.caption}<div class="camera">${item.camera}</div>`;

            overlay.appendChild(text);
            card.appendChild(img);
            card.appendChild(overlay);

            return card;
        }

        function matchesTags(photo, tag) {
            if (tag === "all") return true;
            return (photo.tags || []).includes(tag);
        }

        function render() {
            const grid = document.getElementById("grid");
            grid.innerHTML = "";

            const filtered = data.filter(item => {
                const matchCamera =
                    currentFilters.camera === "all" ||
                    item.camera === currentFilters.camera;

                const matchLocation =
                    currentFilters.location === "all" ||
                    item.location === currentFilters.location;

                const matchTag = matchesTags(item, currentFilters.tag);

                const matchSearch =
                    currentFilters.search === "" ||
                    (item.caption || "")
                        .toLowerCase()
                        .includes(currentFilters.search.toLowerCase());

                return matchCamera && matchLocation && matchTag && matchSearch;
            });

            filtered.forEach(item => {
                grid.appendChild(createCard(item));
            });
        }

        document.getElementById("cameraFilter").addEventListener("change", (e) => {
            currentFilters.camera = e.target.value;
            render();
        });

        document.getElementById("locationFilter").addEventListener("change", (e) => {
            currentFilters.location = e.target.value;
            render();
        });

        document.getElementById("tagFilter").addEventListener("change", (e) => {
            currentFilters.tag = e.target.value;
            render();
        });
    </script>

</body>

</html>
