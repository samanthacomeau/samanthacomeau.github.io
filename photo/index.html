<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photos</title>

    <style>
        /* BACKDROP */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(10px);
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        /* HIDE STATE */
        .hidden {
            display: none;
        }

        /* IMAGE CONTAINER */
        .modal-content {
            max-width: 90%;
            max-height: 90%;
            text-align: center;
        }

        /* LARGE IMAGE */
        .modal-content img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        /* META TEXT */
        #modalMeta {
            margin-top: 10px;
            color: #e5e5e5;
            font-size: 14px;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f0f10;
            color: #e5e5e5;
        }

        header {
            position: sticky;
            top: 0;
            background: rgba(20, 20, 22, 0.9);
            backdrop-filter: blur(10px);
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            /* 🔥 allows wrapping */
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
        }

        /* Make inputs flexible */
        header input,
        header select {
            min-width: 0;
            /* 🔥 prevents overflow */
            flex: 1;
        }

        @media (max-width: 600px) {
            header {
                gap: 6px;
            }

            header h2 {
                width: 100%;
                font-size: 18px;
            }

            header input {
                flex: 1 1 100%;
                /* search gets full row */
            }

            header select {
                flex: 1 1 calc(50% - 6px);
                /* 2 per row */
            }
        }

        h2 {
            margin: 0;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        input,
        select {
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: #1a1a1d;
            color: #e5e5e5;
        }

        input {
            flex: 1;
        }

        .grid {
            column-count: 4;
            column-gap: 15px;
            padding: 15px;
        }

        @media (max-width: 1000px) {
            .grid {
                column-count: 3;
            }
        }

        @media (max-width: 700px) {
            .grid {
                column-count: 2;
            }
        }

        @media (max-width: 500px) {
            .grid {
                column-count: 1;
            }
        }

        .card {
            position: relative;
            margin-bottom: 15px;
            border-radius: 14px;
            overflow: hidden;
            break-inside: avoid;
            cursor: pointer;
        }

        .card img {
            width: 100%;
            display: block;
            transition: transform 0.3s ease;
        }

        .card:hover img {
            transform: scale(1.05);
        }

        /* HOVER OVERLAY */
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top,
                    rgba(0, 0, 0, 0.75),
                    rgba(0, 0, 0, 0.2),
                    transparent);
            opacity: 0;
            display: flex;
            align-items: flex-end;
            padding: 12px;
            transition: opacity 0.25s ease;
        }

        .card:hover .overlay {
            opacity: 1;
        }

        .overlay-text {
            font-size: 14px;
            line-height: 1.4;
        }

        .camera {
            font-size: 12px;
            color: #b0b0b0;
            margin-top: 4px;
        }
    </style>
</head>

<body>

    <header>
        <h2>Photo Hub</h2>
        <select id="cameraFilter">
            <option value="all">All Cameras</option>
        </select>

        <select id="locationFilter">
            <option value="all">All Locations</option>
        </select>
    </header>

    <div class="grid" id="grid"></div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <img id="modalImg" />
            <div id="modalMeta"></div>
        </div>
    </div>

    <script>
        const grid = document.getElementById("grid");
        let filter = document.getElementById("cameraFilter");
        let data = [];

        let currentFilters = {
            camera: "all",
            location: "all",
            tag: "all",
            search: ""
        };

        function uniqueValues(key) {
            const values = new Set();

            data.forEach(item => {
                if (key === "tags") {
                    (item.tags || []).forEach(t => values.add(t));
                } else {
                    values.add(item[key]);
                }
            });

            return [...values].filter(Boolean).sort();
        }
        function populateLocationFilter() {
            const locationSel = document.getElementById("locationFilter");

            // Reset
            locationSel.innerHTML = '<option value="all">All Locations</option>';

            const grouped = {};

            // Group states by country
            data.forEach(item => {
                const loc = item.location;
                if (!loc) return;

                const country = loc.country || "Other";
                const state = loc.state || "Unknown";

                if (!grouped[country]) {
                    grouped[country] = new Set();
                }

                grouped[country].add(state);
            });

            console.log(grouped)

            // Build dropdown
            Object.keys(grouped)
                .sort()
                .forEach(country => {
                    const optgroup = document.createElement("optgroup");
                    optgroup.label = country;

                    [...grouped[country]].sort().forEach(state => {
                        const option = document.createElement("option");
                        option.value = `${country}|ALL`;
                        option.textContent = `${state}`;

                        optgroup.appendChild(option);
                    });

                    locationSel.appendChild(optgroup);
                });
        }

        function populateCameraFilter() {
            const cameraSel = document.getElementById("cameraFilter");

            // Cameras
            uniqueValues("camera").forEach(val => {
                const opt = document.createElement("option");
                opt.value = val;
                opt.textContent = val;
                cameraSel.appendChild(opt);
            });
        }

        async function loadData() {
            try {
                const response = await fetch("data.json");
                data = await response.json();
                render();
                populateCameraFilter();
                populateLocationFilter();
            } catch (err) {
                console.error("Failed to load JSON:", err);
            }
        }
        loadData();
        function createCard(item) {
            const card = document.createElement("div");
            card.className = "card";

            const img = document.createElement("img");
            img.src = item.src;

            const overlay = document.createElement("div");
            overlay.className = "overlay";

            const text = document.createElement("div");
            text.className = "overlay-text";
            text.innerHTML = `${item.caption || ""}<div class="camera">${item.camera || ""}◦${item.location.state},${item.location.country}</div>`;

            overlay.appendChild(text);
            card.appendChild(img);
            card.appendChild(overlay);

            // 🔥 CLICK TO OPEN MODAL
            card.addEventListener("click", () => openModal(item));

            return card;
        }

        function matchesTags(photo, tag) {
            if (tag === "all") return true;
            return (photo.tags || []).includes(tag);
        }

        function matchesLocation(item, selected) {
            if (selected === "all") return true;

            const [country, state] = selected.split("|");
            if (state === "ALL") {
                return item.location && item.location.country === country;
            }

            return (
                item.location &&
                item.location.country === country &&
                item.location.state === state
            );
        }

        function render() {
            const grid = document.getElementById("grid");
            grid.innerHTML = "";

            const filtered = data.filter(item => {
                const matchCamera =
                    currentFilters.camera === "all" ||
                    item.camera === currentFilters.camera;

                const matchLocation = matchesLocation(item, currentFilters.location)

                const matchTag = matchesTags(item, currentFilters.tag);

                const matchSearch =
                    currentFilters.search === "" ||
                    (item.caption || "")
                        .toLowerCase()
                        .includes(currentFilters.search.toLowerCase());

                return matchCamera && matchLocation && matchTag && matchSearch;
            });

            filtered.forEach(item => {
                grid.appendChild(createCard(item));
            });
        }

        document.getElementById("cameraFilter").addEventListener("change", (e) => {
            currentFilters.camera = e.target.value;
            render();
        });

        document.getElementById("locationFilter").addEventListener("change", (e) => {
            currentFilters.location = e.target.value;
            render();
        });

        const modal = document.getElementById("modal");
        const modalImg = document.getElementById("modalImg");
        const modalMeta = document.getElementById("modalMeta");

        function openModal(item) {
            modalImg.src = item.src;

            modalMeta.innerHTML = `
            <div>
                <strong>${item.caption || "Untitled"}</strong>
            </div>
            <div>${item.camera || ""} • ${item.location.state},${item.location.country}</div>
            `;

            modal.classList.remove("hidden");
        }

        function closeModal() {
            modal.classList.add("hidden");
            modalImg.src = "";
        }

        /* click outside image closes modal */
        modal.addEventListener("click", (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });
    </script>
</body>

</html>
